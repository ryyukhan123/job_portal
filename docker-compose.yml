version: "3"

services:

  backend:
    build: ./backend
    container_name: jobportal_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    container_name: jobportal_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
