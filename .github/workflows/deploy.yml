name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Debug (VERY IMPORTANT)
      - name: Debug repo structure
        run: |
          echo "Current path:"
          pwd
          echo "Files:"
          ls -R

      # 3️⃣ Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4️⃣ Build & Push Backend
      - name: Build & Push Backend
        run: |
          echo "Going to backend folder"
          cd backend || cd job-portal/backend
          
          echo "Checking files"
          ls
          
          echo "Building backend image"
          docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:latest .
          
          echo "Pushing backend image"
          docker push ${{ secrets.DOCKER_USERNAME }}/backend:latest

      # 5️⃣ Build & Push Frontend
      - name: Build & Push Frontend
        run: |
          echo "Going to frontend folder"
          cd frontend || cd job-portal/frontend
          
          echo "Checking files"
          ls
          
          echo "Building frontend image"
          docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:latest .
          
          echo "Pushing frontend image"
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:latest

      # 6️⃣ Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/job-portal

            echo "Pulling latest images..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/frontend:latest

            echo "Restarting containers..."
            docker-compose down
            docker-compose up -d
